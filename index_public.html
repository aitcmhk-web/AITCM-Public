      display: none;

// 💡 6. 核心自動滾動監聽（控制滑鼠移入暫停，移出繼續）
function startAutoScroll(element) {
  if (!element) return;
  if (element.scrollHeight <= element.clientHeight) return;

  function runScroll() {
    if (element.dataset.timerId) return; 
    
    const timerId = setInterval(() => {
      element.scrollTop += 1;
      if (element.scrollTop >= (element.scrollHeight - element.clientHeight - 1)) {
        element.scrollTop = 0;
      }
    }, 40); // 40毫秒滾動1像素，可以調整此數字改變速度
    
    element.dataset.timerId = timerId;
  }

  function stopScroll() {
    if (element.dataset.timerId) {
      clearInterval(parseInt(element.dataset.timerId));
      element.removeAttribute('data-timer-id');
    }
  }

  stopScroll();
  element.onmouseenter = null;
  element.onmouseleave = null;

  element.onmouseenter = () => { stopScroll(); }; // 滑鼠移入暫停
  element.onmouseleave = () => { runScroll();  }; // 滑鼠移出繼續

  runScroll();
}

  const email = emailInput.value.trim();

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

    });

// ============================================================
// 文件上传
// ============================================================
function uploadFile(file) {
  return new Promise((resolve, reject) => {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('user', 'web-user');
    const xhr = new XMLHttpRequest();
    xhr.open('POST', DIFY_UPLOAD_URL);
    xhr.onload = function() {
      if (xhr.status === 200 || xhr.status === 201) {
        try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(new Error('解析响应失败')); }
      } else {
        reject(new Error(`上传失败 (${xhr.status}): ${xhr.responseText}`));
      }
    };
    xhr.onerror = function() { reject(new Error('网络请求失败')); };
    xhr.send(formData);
  });
}

fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;
  fileInput.value = '';
  for (const file of files) {
    const tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    const fileItem = { id: tempId, name: file.name, type: file.type || 'application/octet-stream', status: 'uploading', file: file };
    uploadedFiles.push(fileItem);
    renderFileList();
    try {
      const uploadData = await uploadFile(file);
      fileItem.id = uploadData.id;
      fileItem.status = 'done';
      delete fileItem.file;
      console.log('✅👌文件上传成功，ID:', uploadData.id);
    } catch (err) {
      fileItem.status = 'error';
      console.error('❎上传失败:', fileItem.name, err);
    }
    renderFileList();
  }
});

function removeFile(index) { uploadedFiles.splice(index, 1); renderFileList(); }
function renderFileList() {
  if (uploadedFiles.length === 0) { fileList.innerHTML = ''; return; }
  let html = '';
  uploadedFiles.forEach((item, idx) => {
    const statusText = item.status === 'uploading' ? ' ⏳ 上傳中...' : (item.status === 'error' ? ' ❌ 上傳失敗' : ' ✅ 上傳成功');
    html += `<div class="file-tag"><span>${item.name}${statusText}</span>${item.status === 'done' ? `<button class="remove" data-index="${idx}">✕</button>` : ''}</div>`;
  });
  fileList.innerHTML = html;
  fileList.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const index = parseInt(e.target.dataset.index);
      removeFile(index);
    });
  });
}

// ============================================================
// 发送消息
// ============================================================
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text && uploadedFiles.length === 0) return;
  if (isProcessing) return;

  let phoneValue = '';
  } else {
    if (!isVerified || !customerEmail) {
      const saved = localStorage.getItem('customerEmail');
      if (saved) { customerEmail = saved; userPhone = saved; isVerified = true; }
      else { triggerAuth(); return; }
    }
    phoneValue = customerEmail;
  }

  const hasUploading = uploadedFiles.some(f => f.status === 'uploading');
  if (hasUploading) { alert('尚有文件正在上傳，請稍後再試'); return; }

  isProcessing = true;
  userInput.disabled = true;
  sendBtn.disabled = true;
  attachBtn.disabled = true;

  const filesPayload = uploadedFiles.filter(f => f.status === 'done').map(f => ({
    type: f.type.startsWith('image/') ? 'image' : 'document',
    transfer_method: 'local_file',
    upload_file_id: f.id,
  }));

  if (text) appendMessage('user', text);
  if (filesPayload.length > 0) {
    const fileNames = uploadedFiles.filter(f => f.status === 'done').map(f => f.name).join(', ');
    appendMessage('user', `📎 附件：${fileNames}`);
  }
  userInput.value = '';
  uploadedFiles = [];
  renderFileList();
  scrollToBottom();

  const thinkingId = 'thinking_' + Date.now();
  const thinkingEl = appendMessage('ai', '', false, thinkingId);
  thinkingEl.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  thinkingEl.style.border = 'none';
  thinkingEl.style.background = 'transparent';
  thinkingEl.style.padding = '4px 0';
  scrollToBottom();

  try {
    const requestBody = {
      inputs: { phone: phoneValue },
      query: text || '查看附件',
      files: filesPayload,
      response_mode: 'blocking',
      conversation_id: conversationId || null,
      user: 'web-user',
    };
    console.log('📦 请求体:', JSON.stringify(requestBody, null, 2));

    const response = await fetch(DIFY_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody),
    });
    const thinkingElem = document.getElementById(thinkingId);
    if (thinkingElem) thinkingElem.remove();

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API错误，请继续输入：`);
    }
    const data = await response.json();
    if (data.conversation_id) conversationId = data.conversation_id;
    const answer = data.answer || '（无回复内容）';
    appendMessage('ai', answer);
  } catch (error) {
    const thinkingElem = document.getElementById(thinkingId);
    if (thinkingElem) thinkingElem.remove();
    console.error('API调用失败:');
    appendMessage('ai', `⚠️ 连线失败。请检查网络后重新输入：`, true);
  } finally {
    isProcessing = false;
    userInput.disabled = !isVerified;
    sendBtn.disabled = !isVerified;
    attachBtn.disabled = false;
    userInput.focus();
    scrollToBottom();
  }
}
